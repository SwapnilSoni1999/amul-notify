# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Amul Notify Bot

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  BASH_ENV: /home/sonisins/.bashrc

jobs:
  build:
    runs-on: amul-notify-runner

    steps:
      - uses: actions/checkout@v4

      # Write .env.prod
      - name: Write .env.prod
        run: |
          echo "NODE_ENV=${{ vars.PROD_NODE_ENV }}" > .env.prod
          echo "MONGO_URI=${{ secrets.PROD_MONGO_URI }}" >> .env.prod
          echo "BOT_TOKEN=${{ secrets.PROD_BOT_TOKEN }}" >> .env.prod

          echo "TRACKER_ENABLED=${{ vars.PROD_TRACKER_ENABLED }}" >> .env.prod
          echo "BOT_WEBHOOK_URL=${{ vars.PROD_BOT_WEBHOOK_URL}}" >> .env.prod
          echo "BOT_FORCE_POLLING=${{ vars.PROD_BOT_FORCE_POLLING }}" >> .env.prod
          echo "CURL_BIN=/usr/local/bin/curl-impersonate-ff" >> .env.prod

          echo "ORDER_SERVER_API_URL=${{ vars.PROD_ORDER_SERVER_API_URL }}" >> .env.prod
          echo "ORDER_SERVER_API_KEY=${{ secrets.PROD_ORDER_SERVER_API_KEY }}" >> .env.prod
          echo "RAZORPAY_API_KEY=${{ secrets.PROD_RAZORPAY_API_KEY }}" >> .env.prod
          echo "RAZORPAY_API_SECRET=${{ secrets.PROD_RAZORPAY_API_SECRET }}" >> .env.prod
          echo "RAZORPAY_REDIRECT_URL=${{ vars.PROD_RAZORPAY_REDIRECT_URL }}" >> .env.prod
          echo "RAZORPAY_WEBHOOK_SECRET=${{ secrets.PROD_RAZORPAY_WEBHOOK_SECRET }}" >> .env.prod

      - name: Backup MongoDB database
        env:
          MONGO_URI: ${{ secrets.PROD_MONGO_URI }}
        run: |
          BACKUP_DIR="$HOME/amul-bot-db-backup"
          TIMESTAMP="$(date +'%Y%m%d-%H%M%S')"
          BACKUP_FILE="$BACKUP_DIR/amul-notify-$TIMESTAMP.archive.gz"

          mkdir -p "$BACKUP_DIR"

          mongodump --uri="$MONGO_URI" --archive="$BACKUP_FILE" --gzip

          find "$BACKUP_DIR" -maxdepth 1 -type f -name '*.archive.gz' \
            -printf '%T@ %p\n' \
            | sort -rn \
            | tail -n +6 \
            | cut -d' ' -f2- \
            | xargs -r rm -f

      - name: Build Docker image
        run: |
          docker build --network=host -t amul-notify-bot .

      - name: Stop and Remove existing container
        run: |
          docker stop amul-notify-bot || true
          docker rm amul-notify-bot || true

      - name: Run Docker container
        run: |
          docker run -d --network=host --name amul-notify-bot amul-notify-bot:latest
