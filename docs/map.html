<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .controls {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 1000;
      display: flex;
      gap: 5px;
    }

    .form-input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
    }

    #highlight {
      background-color: #3b82f6;
      color: white;
      padding: 0.5rem 1rem;
      border: none;
      cursor: pointer;
      text-rendering: optimizeSpeed;
    }

    .map-disclaimer {
      position: absolute;
      left: 1rem;
      bottom: 1.5rem;
      z-index: 1000;
      max-width: min(28rem, calc(100vw - 2rem));
      padding: 0.75rem 0.875rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.94);
      color: #334155;
      font:
        0.8125rem/1.4 system-ui,
        -apple-system,
        BlinkMacSystemFont,
        'Segoe UI',
        sans-serif;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
    }

    .map-disclaimer strong {
      color: #0f172a;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .controls {
        top: 1rem;
        right: 1rem;
        left: 1rem;
      }

      .map-disclaimer {
        bottom: 1rem;
      }
    }
  </style>
  <body>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <div id="map" style="height: 100vh"></div>
    <form class="controls" onsubmit="return false">
      <input
        type="text"
        id="pincode"
        class="form-input"
        placeholder="Pincode"
      />
      <button
        id="highlight"
        onclick="highlightPin(document.getElementById('pincode').value)"
      >
        Highlight
      </button>
    </form>
    <div class="map-disclaimer" role="note">
      <strong>Map notice:</strong> Boundaries, labels, and the coverage outline
      shown come from map providers and public datasets for approximate pincode
      visualization only. This project does not claim, endorse, or dispute any
      territorial boundary.
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const API = 'https://amul.10xdev.me/api' // change if needed
      const INDIA_COVERAGE_URL = 'india-service-coverage.geojson'

      const map = L.map('map').setView([22.9734, 78.6569], 5)
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
      }).addTo(map)

      const base = {
        color: '#cbd5e1',
        weight: 1,
        fillColor: '#f1f5f9',
        fillOpacity: 0.04
      }
      const hi = {
        color: '#0f172a',
        weight: 3,
        fillColor: '#3b82f6',
        fillOpacity: 0.45
      }

      const worldRing = [
        [-90, -180],
        [-90, 180],
        [90, 180],
        [90, -180]
      ]

      const lngLatToLatLng = ([lng, lat]) => [lat, lng]

      function getOuterRings(geometry) {
        if (!geometry) return []

        if (geometry.type === 'Polygon') {
          return geometry.coordinates.length ? [geometry.coordinates[0]] : []
        }

        if (geometry.type === 'MultiPolygon') {
          return geometry.coordinates
            .map((polygon) => polygon[0])
            .filter(Boolean)
        }

        return []
      }

      async function addIndiaCoverageMask() {
        const r = await fetch(INDIA_COVERAGE_URL)
        if (!r.ok) throw new Error('Failed to load India coverage outline')

        const coverage = await r.json()
        const features =
          coverage.type === 'FeatureCollection'
            ? coverage.features
            : [{ type: 'Feature', geometry: coverage }]

        const holes = features
          .flatMap((feature) => getOuterRings(feature.geometry))
          .map((ring) => ring.map(lngLatToLatLng))

        L.polygon([worldRing, ...holes], {
          stroke: false,
          fillColor: '#f8fafc',
          fillOpacity: 0.58,
          fillRule: 'evenodd',
          interactive: false
        }).addTo(map)

        L.geoJSON(coverage, {
          style: {
            color: '#0f172a',
            weight: 2,
            opacity: 0.75,
            fillOpacity: 0
          },
          interactive: false
        }).addTo(map)
      }

      let hiLayer

      addIndiaCoverageMask().catch((err) => {
        console.error(err)
      })

      async function highlightPin(pin) {
        const r = await fetch(`${API}/pincode/${pin}`)
        if (!r.ok) return alert('PIN not found')
        const feature = await r.json()

        console.log(feature)

        if (hiLayer) map.removeLayer(hiLayer)
        hiLayer = L.geoJSON(feature, {
          coordsToLatLng: (c) => L.latLng(c[1], c[0]), // guards against any accidental flip
          style: hi
        }).addTo(map)

        map.fitBounds(hiLayer.getBounds(), { padding: [40, 40] })

        const name = [
          feature.properties?.Office_Name ||
            feature.properties?.Pincode ||
            'Area',
          `Total Users: ${feature.totalUsers}`
        ].join('<br />')
        hiLayer.bindTooltip(String(name))
      }

      // demo
      highlightPin('110011')
    </script>
  </body>
</html>
